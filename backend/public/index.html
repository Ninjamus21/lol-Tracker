<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Last Game Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Last LoL Game Tracker</h1>
    <div class="input-box">
        <input type="text" id="gameName" placeholder="Summoner Name">
        <input type="text" id="tagLine" placeholder="TagLine">
        <button id="fetchBtn">Get Last Game</button>
    </div>

    <div id="result" class="result-card">
        <!-- Token placeholder will be injected/updated by script.js -->
        <div class="token-wrap" id="tokenWrap" aria-hidden="true"></div>
        <!-- Stats go into statsWrap so we can update them without removing the token element -->
        <div id="statsWrap">
          <p class="placeholder">Enter summoner info above and click "Get Last Game"</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
